<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellove's Birthday Page</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
    <header>
        <h1>Hello, baby</h1>
    </header>
    <main>
        <p>Hello again, baby!</p>
        <img src="img/gif/cinnamoroll-bubutt-dance.gif" width="138" height="200" alt="Cinnamoroll dance">
        <p id="countdown"></p>
        <script>
            function daysUntil(month, day) {
                const today = new Date();

                let target = new Date(today.getFullYear(), month - 1, day);

                if (target < today) {
                    target.setFullYear(today.getFullYear() + 1);
                }

                today.setHours(0, 0, 0, 0);
                target.setHours(0, 0, 0, 0);

                const diff = target - today;
                return Math.ceil(diff / (1000 * 60 * 60 * 24));
            }

            const days = daysUntil(7, 12); // Change to your month and day

            document.getElementById("countdown").textContent =
            days === 0
                ? "Today's the day! 🎉"
                : `${days} day${days !== 1 ? 's' : ''} until your special day 💖`;
        </script>
    </main>
    <footer>
        &copy; Jowin ❤️ Ellove
    </footer>
</body>
</html>
